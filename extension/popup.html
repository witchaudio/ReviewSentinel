<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewSentinel Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      color: #666;
      font-size: 11px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #666; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-err { background: #fce4ec; color: #c62828; }
    .status-checking { background: #f5f5f5; color: #666; }
  </style>
</head>
<body>
  <h1>ReviewSentinel</h1>
  <p class="subtitle">Fake review detection for Amazon</p>

  <label for="endpoint">API Endpoint</label>
  <input type="text" id="endpoint" placeholder="http://localhost:8000" />
  <button id="save">Save &amp; Test Connection</button>
  <div id="status" class="status-checking">Checking connection…</div>

  <script src="popup.js"></script>
</body>
</html>
